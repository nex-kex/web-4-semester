<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Bull Gym</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            max-width: 500px;
            width: 100%;
        }

        .register-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #b61815;
            box-shadow: 0 20px 60px rgba(182, 24, 21, 0.2);
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            color: #b61815;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #ffffff;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            font-family: 'Roboto', sans-serif;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #b61815;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #b61815;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Oswald', sans-serif;
            margin-top: 10px;
        }

        button:hover {
            background: #8f1310;
            transform: translateY(-2px);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
            display: block;
        }

        .message.error {
            background: rgba(182, 24, 21, 0.2);
            color: #b61815;
            border: 1px solid #b61815;
            display: block;
        }

        .credentials {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            border: 1px solid #b61815;
        }

        .credentials p {
            color: #fff;
            margin: 10px 0;
        }

        .credentials strong {
            color: #b61815;
        }

        .credentials .note {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
            text-align: center;
            border-top: 1px solid #3a3a3a;
            padding-top: 10px;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #888;
        }

        .login-link a {
            color: #b61815;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .back-link {
            text-align: center;
            margin-top: 15px;
        }

        .back-link a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            color: #b61815;
        }

        .manual-login-btn {
            background: #28a745;
            margin-top: 15px;
        }

        .manual-login-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-box">
            <h1>📝 Регистрация</h1>
            <p style="color: #888; text-align: center; margin-bottom: 20px;">
                Заполните форму для создания личного кабинета
            </p>

            <div id="message" class="message"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Имя *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label>Телефон *</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Комментарий (необязательно)</label>
                    <textarea id="comment" name="comment" placeholder="Ваши пожелания или вопросы"></textarea>
                </div>
                <button type="submit">Зарегистрироваться</button>
            </form>

            <div id="credentials" class="credentials"></div>

            <div class="login-link">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </div>
            <div class="back-link">
                <a href="index.html">← На главную</a>
            </div>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const message = document.getElementById('message');
        const credentialsDiv = document.getElementById('credentials');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                comment: document.getElementById('comment').value
            };

            message.className = 'message';
            message.style.display = 'none';
            credentialsDiv.style.display = 'none';

            try {
                const response = await fetch('/web4/lab8/api/register.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Скрываем форму
                    registerForm.style.display = 'none';

                    // Показываем логин и пароль под формой
                    credentialsDiv.innerHTML = `
                        <p><strong>✅ Регистрация успешна!</strong></p>
                        <p><strong>Логин:</strong> ${data.data.login}</p>
                        <p><strong>Пароль:</strong> ${data.data.password}</p>
                        <p style="margin-top: 10px;">Сохраните эти данные для входа в личный кабинет.</p>
                        <div class="note">⚠️ Логин и пароль нельзя восстановить. Сохраните их сейчас!</div>
                        <button type="button" class="manual-login-btn" onclick="window.location.href='/web4/lab8/public/login.html'">Перейти ко входу →</button>
                    `;
                    credentialsDiv.style.display = 'block';

                    message.textContent = 'Регистрация успешна! Данные для входа указаны ниже.';
                    message.classList.add('success');
                    message.style.display = 'block';

                    // Очищаем форму
                    registerForm.reset();

                } else {
                    const errors = data.errors;
                    let errorText = '❌ Ошибка регистрации:\n';
                    for (let key in errors) {
                        errorText += `- ${errors[key]}\n`;
                    }
                    message.textContent = errorText;
                    message.classList.add('error');
                    message.style.display = 'block';
                }
            } catch (error) {
                message.textContent = '❌ Ошибка соединения. Попробуйте позже.';
                message.classList.add('error');
                message.style.display = 'block';
            }
        });
    </script>
</body>
</html>
