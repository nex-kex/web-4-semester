<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - Bull Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ... стили как в предыдущей версии ... */
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
            white-space: pre-line;
        }
        .message.success {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
            display: block;
        }
        .message.error {
            background: rgba(182, 24, 21, 0.2);
            color: #b61815;
            border: 1px solid #b61815;
            display: block;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status-new {
            background: #b61815;
            color: white;
        }
        .status-edited {
            background: #ffc107;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="logo">BULL GYM</a>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
            </div>
        </div>

        <div class="profile-card">
            <h1>👤 Личный кабинет</h1>

            <div class="login-info">
                <p><strong>Ваш логин:</strong> <span id="userLogin"></span></p>
                <p><strong>Статус:</strong> <span id="userStatus" class="status-badge"></span></p>
                <p class="info-text">⚠️ Логин и пароль нельзя изменить. Сохраните их в надежном месте.</p>
            </div>

            <div id="loading" class="loading">Загрузка данных...</div>

            <form id="profileForm" style="display: none;">
                <div class="form-group">
                    <label>Имя *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label>Телефон *</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <button type="submit">💾 Сохранить изменения</button>
            </form>

            <div class="button-group">
                <a href="index.html" class="home-btn">🏠 На главную</a>
                <a href="/web4/lab8/api/logout.php" class="logout-btn">🚪 Выйти</a>
            </div>

            <div id="message" class="message"></div>

            <div class="back-link">
                <a href="login.html">Войти под другим аккаунтом</a>
            </div>
        </div>
    </div>

    <script src="profile.js"></script>
</body>
</html>
